<style>
:root{
  --bg:#f7f8fc; --card:#ffffff; --text:#171a21; --muted:#6b7280;
  --line:#e7e9f0; --accent:#4f6df5; --accent-soft:#eef1ff;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;
  line-height:1.75;
}
header{
  position:sticky; top:0; z-index:20;
  backdrop-filter:blur(14px); background:rgba(247,248,252,.88);
  border-bottom:1px solid rgba(231,233,240,.9);
}
.header-inner{
  max-width:960px; margin:auto; padding:18px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.brand{font-weight:800; font-size:20px; letter-spacing:-.02em}
.brand span{color:var(--accent)}
nav{display:flex; gap:10px; flex-wrap:wrap}
nav a{
  color:var(--muted); text-decoration:none; font-size:14px;
  padding:8px 12px; border-radius:999px;
}
nav a:hover{background:var(--accent-soft); color:var(--accent)}
main{max-width:960px; margin:44px auto; padding:0 24px 70px}
.hero{
  background:linear-gradient(135deg,#ffffff,#f3f5ff);
  border:1px solid var(--line); border-radius:28px; padding:42px;
  box-shadow:0 20px 55px rgba(31,41,55,.07); margin-bottom:28px;
}
.hero h1{margin:0 0 10px; font-size:38px; letter-spacing:-.04em}
.hero p{margin:0; color:var(--muted)}
.badge{
  display:inline-block; margin-top:18px; padding:7px 11px; border-radius:999px;
  background:var(--accent-soft); color:var(--accent); font-size:13px; font-weight:700;
}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:24px;
  padding:36px 40px; margin:22px 0; box-shadow:0 10px 28px rgba(31,41,55,.04);
}
h1,h2,h3,h4{line-height:1.35; letter-spacing:-.025em; scroll-margin-top:100px}
h2{font-size:28px; margin:0 0 28px}
h3{font-size:20px; margin:34px 0 12px}
h4{font-size:17px; margin:28px 0 10px}
p{margin:10px 0}
ul,ol{padding-left:24px}
li{margin:5px 0}
strong{font-weight:750}
blockquote{
  margin:20px 0; padding:16px 18px; border-left:4px solid var(--accent);
  background:var(--accent-soft); border-radius:10px; color:#445;
}
.table-wrap{overflow-x:auto; margin:18px 0}
table{width:100%; border-collapse:collapse; min-width:680px; font-size:14px}
th,td{padding:13px 14px; border:1px solid var(--line); vertical-align:top}
th{background:#f3f5f9; text-align:left}
code{background:#f0f2f5; padding:2px 6px; border-radius:6px}
footer{max-width:960px; margin:0 auto; padding:0 24px 48px; color:var(--muted); font-size:13px}
.contact-box{
  margin-top:28px; padding:20px; border-radius:16px; background:#f8f9fc;
  border:1px solid var(--line)
}
@media (max-width:720px){
  .header-inner{align-items:flex-start; flex-direction:column}
  main{margin-top:24px; padding:0 16px 50px}
  .hero{padding:28px 24px; border-radius:20px}
  .hero h1{font-size:30px}
  .card{padding:26px 22px; border-radius:18px}
  nav{gap:4px}
  nav a{padding:6px 9px; font-size:13px}
}
</style>
